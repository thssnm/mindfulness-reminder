name: Build Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:                   
      contents: write               
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper vcsInfo
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4' 
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK (arm64)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm64
      
      - name: Build APK (armeabi-v7a)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm
      
      - name: Build APK (x86_64)
        run: flutter build apk --release --split-per-abi --target-platform=android-x64
      
      - name: Rename APKs with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd build/app/outputs/flutter-apk/
          mv app-arm64-v8a-release.apk mindfulness-reminder-${VERSION}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk mindfulness-reminder-${VERSION}-armeabi-v7a.apk
          mv app-x86_64-release.apk mindfulness-reminder-${VERSION}-x86_64.apk
      
      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
